openapi: 3.0.3
info:
  title: API Gateway Surface API
  version: 1.0.0
  description: |
    Externally exposed endpoints on the API Gateway. Most API paths are pass-through routes to backend services.
servers:
  - url: http://localhost:8080
tags:
  - name: User Service (Routed)
  - name: Banking System (Routed)
  - name: Gateway Actuator
paths:
  /api/auth/register:
    post:
      tags: [User Service (Routed)]
      summary: Routed to user-service register
      description: Forwards a registration request to the user-service through the gateway.
      requestBody:
        required: true
        description: Registration payload forwarded to the downstream auth service.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Forwarded response from user-service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassThroughResponse'
  /api/auth/login:
    post:
      tags: [User Service (Routed)]
      summary: Routed to user-service login
      description: Forwards a login request to the user-service through the gateway.
      requestBody:
        required: true
        description: Login credentials forwarded to the downstream auth service.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Forwarded response from user-service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassThroughResponse'
  /api/auth/refresh:
    post:
      tags: [User Service (Routed)]
      summary: Routed to user-service token refresh
      description: Forwards a refresh-token request to the user-service through the gateway.
      requestBody:
        required: true
        description: Refresh token payload forwarded to the downstream auth service.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Forwarded response from user-service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassThroughResponse'
  /api/users:
    get:
      tags: [User Service (Routed)]
      summary: Routed to user-service list users
      description: Retrieves the full user list from the user-service through the gateway.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Forwarded response from user-service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassThroughResponse'
    post:
      tags: [User Service (Routed)]
      summary: Routed to user-service create user
      description: Creates a user by forwarding the request to the user-service.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: User creation payload forwarded to the downstream user-service.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          description: Forwarded response from user-service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassThroughResponse'
  /api/users/{id}:
    get:
      tags: [User Service (Routed)]
      summary: Routed to user-service get user
      description: Fetches a single user by ID from the user-service.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Forwarded response from user-service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassThroughResponse'
    put:
      tags: [User Service (Routed)]
      summary: Routed to user-service update user
      description: Updates an existing user by forwarding the request to the user-service.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        description: User update payload forwarded to the downstream user-service.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Forwarded response from user-service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassThroughResponse'
    delete:
      tags: [User Service (Routed)]
      summary: Routed to user-service delete user
      description: Deletes a user by forwarding the request to the user-service.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Forwarded response from user-service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassThroughResponse'

  /api/banking/auth/login:
    post:
      tags: [Banking System (Routed)]
      summary: Routed to banking-system login
      description: Forwards banking auth login requests to the banking-system service.
      requestBody:
        required: true
        description: Banking login credentials forwarded to the downstream banking auth service.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Forwarded response from banking-system
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassThroughResponse'
  /api/banking/auth/refresh:
    post:
      tags: [Banking System (Routed)]
      summary: Routed to banking-system refresh
      description: Forwards banking auth refresh requests to the banking-system service.
      requestBody:
        required: true
        description: Banking refresh-token payload forwarded to the downstream banking auth service.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Forwarded response from banking-system
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassThroughResponse'
  /api/banking/admin/accounts:
    post:
      tags: [Banking System (Routed)]
      summary: Routed to banking-system admin account creation
      description: Creates a banking account by forwarding the request to the banking-system service.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: Account creation payload forwarded to the downstream banking admin API.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          description: Forwarded response from banking-system
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassThroughResponse'
  /api/banking/accounts/mine:
    get:
      tags: [Banking System (Routed)]
      summary: Routed to banking-system my accounts
      description: Retrieves the authenticated holder's accounts through the gateway.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Forwarded response from banking-system
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassThroughResponse'
  /api/banking/accounts/{accountId}/transactions/deposit:
    post:
      tags: [Banking System (Routed)]
      summary: Routed to banking-system deposit
      description: Deposits funds into an account by forwarding the request to the banking-system service.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountId'
      requestBody:
        required: true
        description: Deposit payload forwarded to the downstream banking transaction API.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Forwarded response from banking-system
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassThroughResponse'
  /api/banking/accounts/{accountId}/transactions/withdraw:
    post:
      tags: [Banking System (Routed)]
      summary: Routed to banking-system withdraw
      description: Withdraws funds from an account by forwarding the request to the banking-system service.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountId'
      requestBody:
        required: true
        description: Withdrawal payload forwarded to the downstream banking transaction API.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Forwarded response from banking-system
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassThroughResponse'

  /actuator/health:
    get:
      tags: [Gateway Actuator]
      summary: Gateway health endpoint
      description: Returns the gateway health status.
      responses:
        '200':
          description: Health response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /actuator/info:
    get:
      tags: [Gateway Actuator]
      summary: Gateway info endpoint
      description: Returns application metadata exposed by the gateway actuator.
      responses:
        '200':
          description: Info response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /actuator/metrics:
    get:
      tags: [Gateway Actuator]
      summary: Metrics index
      description: Returns the list of available gateway metrics.
      responses:
        '200':
          description: Metrics response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /actuator/prometheus:
    get:
      tags: [Gateway Actuator]
      summary: Prometheus scrape endpoint
      description: Exposes gateway metrics in Prometheus text format.
      responses:
        '200':
          description: Prometheus text
          content:
            text/plain:
              schema:
                type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserId:
      name: id
      in: path
      required: true
      description: Numeric user identifier.
      schema:
        type: integer
        format: int64
    AccountId:
      name: accountId
      in: path
      required: true
      description: Numeric account identifier.
      schema:
        type: integer
        format: int64
  schemas:
    PassThroughResponse:
      type: object
      description: Response payload is produced by downstream service and forwarded by gateway.
      additionalProperties: true
